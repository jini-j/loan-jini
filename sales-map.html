<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>영업 지도</title>
<!-- Kakao SDK 동적 로드 -->
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--p:#2563eb;--pl:#eff6ff;--g1:#f8fafc;--g2:#f1f5f9;--g3:#e2e8f0;--g4:#94a3b8;--g5:#64748b;--g6:#475569;--g7:#1e293b;--g8:#0f172a;--er:#dc2626;--ok:#16a34a;--warn:#d97706;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g2);color:var(--g7);min-height:100vh}
.topbar{background:var(--p);color:#fff;padding:12px 16px 0;position:sticky;top:0;z-index:100}
.topbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.topbar h1{font-size:16px;font-weight:800;flex:1}
.tabs{display:flex}
.tab{flex:1;padding:8px 2px;font-size:11px;font-weight:700;text-align:center;color:rgba(255,255,255,.6);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent}
.tab.on{color:#fff;border-bottom:3px solid #fff}
.panel{display:none;padding:12px;min-height:calc(100vh - 100px)}
.panel.on{display:block}
.card{background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:12px;font-weight:700;color:var(--g5);margin-bottom:8px}
.inp{width:100%;height:42px;border:1.5px solid var(--g3);border-radius:8px;padding:0 11px;font-size:14px;color:var(--g7);outline:none;background:#fff}
.inp:focus{border-color:var(--p)}
.row{display:flex;gap:7px}
.btn{height:42px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;padding:0 14px}
.btn-p{background:var(--p);color:#fff;width:100%}
.btn-s{background:var(--g2);color:var(--g6);border:1.5px solid var(--g3)}
#map{width:100%;height:260px;border-radius:10px;overflow:hidden;margin-bottom:10px}
/* est */
.est-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--g2)}
.est-item:last-child{border-bottom:none}
.est-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:2px;background:var(--p);color:#fff}
.est-num.visited{background:var(--ok)}
.est-num.fav{background:#f59e0b}
.est-info{flex:1;min-width:0}
.est-name{font-size:13px;font-weight:700;color:var(--g7);margin-bottom:1px}
.est-addr{font-size:10px;color:var(--g5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.est-dist{font-size:10px;color:var(--p);font-weight:600}
.est-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.est-actions{display:flex;gap:4px;flex-shrink:0;flex-direction:column;align-items:flex-end}
/* route */
.route-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--g2)}
.route-item:last-child{border-bottom:none}
.route-item.done{opacity:.5}
.route-num{width:26px;height:26px;background:var(--warn);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;cursor:pointer}
.route-num.done{background:var(--ok)}
.route-info{flex:1;min-width:0}
.route-name{font-size:13px;font-weight:700}
.route-addr{font-size:10px;color:var(--g5)}
.route-meta{font-size:10px;color:var(--warn);margin-top:2px}
.route-actions{display:flex;gap:4px;flex-direction:column;align-items:flex-end;flex-shrink:0}
/* rank */
.rank-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--g2);cursor:pointer}
.rank-item:last-child{border-bottom:none}
.rank-n{width:22px;text-align:center;font-weight:800;font-size:13px;color:var(--p)}
.rank-n.t1{color:#f59e0b}.rank-n.t2{color:#94a3b8}.rank-n.t3{color:#92400e}
.rank-info{flex:1}
.rank-name{font-size:13px;font-weight:700}
.rank-sub{font-size:10px;color:var(--g5)}
.bar-wrap{height:3px;background:var(--g2);border-radius:2px;margin-top:3px}
.bar-buy{height:3px;background:var(--p);border-radius:2px}
.bar-rent{height:3px;background:var(--ok);border-radius:2px}
/* badge */
.badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:10px;font-weight:700}
.badge-b{background:var(--pl);color:var(--p)}
.badge-g{background:#dcfce7;color:var(--ok)}
.badge-w{background:#fef3c7;color:var(--warn)}
.badge-r{background:#fee2e2;color:var(--er)}
/* status tags */
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid}
.tag-new{background:#eff6ff;color:var(--p);border-color:#bfdbfe}
.tag-reg{background:#dcfce7;color:var(--ok);border-color:#86efac}
.tag-hold{background:#fef3c7;color:var(--warn);border-color:#fcd34d}
.tag-fav{background:#fef9c3;color:#a16207;border-color:#fde047}
/* misc */
.empty{text-align:center;padding:36px 20px;color:var(--g4)}
.empty-icon{font-size:36px;margin-bottom:8px}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--g8);color:#fff;padding:9px 18px;border-radius:30px;font-size:12px;font-weight:600;z-index:999;display:none;white-space:nowrap}
.fb{padding:5px 10px;border-radius:20px;border:1.5px solid var(--g3);background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:var(--g6)}
.fb.on{background:var(--p);color:#fff;border-color:var(--p)}
.btn-sm{height:26px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;padding:0 7px;border:1px solid var(--g3);background:none;color:var(--g6)}
.spin{display:inline-block;animation:spin .8s linear infinite;font-size:22px}
@keyframes spin{to{transform:rotate(360deg)}}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:18px;width:100%}
.modal h3{font-size:15px;font-weight:800;margin-bottom:10px}
.modal textarea{width:100%;height:90px;border:1.5px solid var(--g3);border-radius:8px;padding:9px;font-size:13px;resize:none;outline:none;font-family:inherit}
.modal textarea:focus{border-color:var(--p)}
/* history */
.hist-item{padding:9px 0;border-bottom:1px solid var(--g2)}
.hist-item:last-child{border-bottom:none}
.hist-date{font-size:10px;color:var(--g4);font-weight:600}
.hist-name{font-size:13px;font-weight:700;margin-top:1px}
.hist-memo{font-size:11px;color:var(--g5);margin-top:2px}
/* 전월대비 */
.up{color:#dc2626;font-weight:700;font-size:10px}
.dn{color:#2563eb;font-weight:700;font-size:10px}
.flat{color:var(--g4);font-size:10px}
/* dday */
.dday-soon{color:var(--er);font-weight:700}
.dday-ok{color:var(--ok);font-weight:700}
</style>
</head>
<body>
<div id="js-ok" style="display:none;position:fixed;top:0;left:0;right:0;background:#16a34a;color:#fff;text-align:center;font-size:13px;font-weight:700;padding:6px;z-index:9999">✅ JS 정상 실행 중</div>
<div class="topbar">
  <div class="topbar-row">
    <h1>🗺️ 영업 지도</h1>
    <span id="route-badge" style="background:var(--warn);color:#fff;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;display:none">동선 0</span>
    <span id="fav-badge" style="background:#f59e0b;color:#fff;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;display:none">⭐0</span>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="swTab(0)">📊 거래분석</button>
    <button class="tab" onclick="swTab(1)">🔍 탐색</button>
    <button class="tab" onclick="swTab(2)">🧭 동선</button>
    <button class="tab" onclick="swTab(3)">📋 영업관리</button>
  </div>
</div>
<div id="toast"></div>

<!-- 실거래 상세 모달 -->
<div id="apt-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeAptModal()">
  <div class="modal" style="max-height:84vh;overflow-y:auto;padding-bottom:28px">
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:10px">
      <div style="flex:1">
        <div id="apt-modal-name" style="font-size:16px;font-weight:800"></div>
        <div id="apt-modal-dong" style="font-size:11px;color:var(--g5);margin-top:2px"></div>
      </div>
      <button onclick="closeAptModal()" style="background:var(--g2);border:none;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;flex-shrink:0">✕</button>
    </div>
    <div id="apt-modal-summary" style="display:flex;gap:7px;margin-bottom:12px"></div>
    <div id="apt-modal-buy-wrap"><div style="font-size:11px;font-weight:700;color:var(--p);margin-bottom:5px">🔵 매매 실거래 내역</div><div id="apt-modal-buy"></div></div>
    <div id="apt-modal-rent-wrap" style="margin-top:12px"><div style="font-size:11px;font-weight:700;color:var(--ok);margin-bottom:5px">🟢 전세 실거래 내역</div><div id="apt-modal-rent"></div></div>
    <div style="display:flex;gap:7px;margin-top:14px">
      <button class="btn btn-s" style="flex:1;height:40px" onclick="closeAptModal()">닫기</button>
      <button class="btn btn-p" style="flex:2;height:40px" id="apt-modal-nav-btn">📍 주변 부동산 찾기</button>
    </div>
  </div>
</div>

<!-- 메모/재방문 모달 -->
<div id="memo-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeMemo()">
  <div class="modal">
    <h3 id="memo-title">메모</h3>
    <textarea id="memo-text" placeholder="방문 결과, 담당자명 등..."></textarea>
    <div style="margin-top:8px">
      <label style="font-size:11px;color:var(--g5);display:block;margin-bottom:4px">재방문 예정일</label>
      <input type="date" id="memo-date" class="inp" style="height:38px;font-size:13px">
    </div>
    <div style="display:flex;gap:7px;margin-top:10px">
      <button class="btn btn-s" style="flex:1" onclick="closeMemo()">취소</button>
      <button class="btn btn-p" style="flex:2" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<!-- 탭0: 거래분석 -->
<div id="p0" class="panel on">
  <div class="card">
    <div style="display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap">
      <button class="fb on" id="ft-m0" onclick="setPeriod('m0')">이번달</button>
      <button class="fb" id="ft-m1" onclick="setPeriod('m1')">지난달</button>
      <button class="fb" id="ft-m2" onclick="setPeriod('m2')">2달전</button>
      <button class="fb" id="ft-w0" onclick="setPeriod('w0')">최근1주</button>
      <button class="fb" id="ft-w1" onclick="setPeriod('w1')">2주전</button>
      <button class="fb" style="margin-left:auto" onclick="loadByPeriod()">🔄</button>
    </div>
    <div style="display:flex;gap:5px;margin-bottom:7px">
      <button class="fb on" id="ft-all" onclick="setType('all')">전체</button>
      <button class="fb" id="ft-buy" onclick="setType('buy')">🔵 매매</button>
      <button class="fb" id="ft-rent" onclick="setType('rent')">🟢 전세</button>
    </div>
    <div style="display:flex;gap:5px;align-items:center">
      <span style="font-size:10px;color:var(--g5)">정렬</span>
      <button class="fb on" id="sort-desc" onclick="setSort(true)">많은순 ↓</button>
      <button class="fb" id="sort-asc" onclick="setSort(false)">적은순 ↑</button>
      <button class="fb" id="btn-cmp" onclick="toggleCmp()" style="margin-left:auto">전월비교 OFF</button>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span class="card-title" style="margin:0">🏆 서울 구별 거래량</span>
      <span id="data-badge" class="badge badge-w">로딩중</span>
    </div>
    <div id="rank-list"><div style="text-align:center;padding:32px 16px"><p style="font-size:13px;color:var(--g4);margin-bottom:16px">기간을 선택하고 버튼을 눌러주세요<br><span style="font-size:11px">(약 20~40초 소요)</span></p><button onclick="loadByPeriod()" style="height:48px;width:100%;max-width:280px;border:none;border-radius:10px;background:var(--p);color:#fff;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation">📊 거래량 불러오기</button></div></div>
  </div>
  <div class="card" id="apt-card" style="display:none">
    <div class="card-title">🏢 <span id="apt-gu-name"></span> 거래 아파트 <span id="apt-badge" class="badge badge-b"></span></div>
    <div id="apt-list"></div>
  </div>
</div>

<!-- 탭1: 부동산탐색 -->
<div id="p1" class="panel">
  <div class="card">
    <div class="row" style="margin-bottom:7px">
      <input class="inp" id="search-kw" placeholder="아파트명 또는 주소 검색" style="flex:1" onkeydown="if(event.key==='Enter')searchAddr()">
      <button class="btn btn-s" onclick="searchAddr()">검색</button>
    </div>
    <button class="btn" onclick="useMyLoc()" style="width:100%;background:#f0fdf4;color:var(--ok);border:1.5px solid #86efac;height:40px;font-size:13px">📍 현재 위치에서 찾기</button>
  </div>
  <div class="card" style="padding:9px 13px">
    <div style="font-size:11px;color:var(--g5);margin-bottom:5px">탐색 반경</div>
    <div style="display:flex;gap:5px">
      <button class="fb" id="r300" onclick="setRadius(300)">300m</button>
      <button class="fb on" id="r500" onclick="setRadius(500)">500m</button>
      <button class="fb" id="r1000" onclick="setRadius(1000)">1km</button>
      <button class="fb" id="r2000" onclick="setRadius(2000)">2km</button>
    </div>
  </div>
  <div id="map"></div>
  <div class="card">
    <div class="card-title" id="est-count">주변 공인중개사</div>
    <div id="est-list"><div class="empty"><div class="empty-icon">🔍</div>위치를 검색하거나 현재 위치를 선택하세요</div></div>
  </div>
</div>

<!-- 탭2: 오늘동선 -->
<div id="p2" class="panel">
  <div class="card" style="padding:11px 13px">
    <div style="display:flex;gap:5px;align-items:center">
      <span style="font-size:11px;color:var(--g5)">완료</span>
      <span id="done-cnt" style="font-weight:800;color:var(--ok)">0</span>
      <span style="font-size:11px;color:var(--g4)">/</span>
      <span id="total-cnt" style="font-weight:800;color:var(--p)">0</span>
      <span style="font-size:11px;color:var(--g5)">곳</span>
      <span style="flex:1"></span>
      <button class="btn-sm" style="background:var(--p);color:#fff;border-color:var(--p)" onclick="optimizeRoute()">🗺️ 최적화</button>
      <button class="btn-sm" onclick="clearRoute()">초기화</button>
    </div>
    <div style="margin-top:7px;height:5px;background:var(--g2);border-radius:3px;overflow:hidden">
      <div id="progress-bar" style="height:5px;background:var(--ok);border-radius:3px;width:0%;transition:width .4s"></div>
    </div>
  </div>
  <!-- 재방문 예정 알림 -->
  <div id="revisit-alert" style="display:none"></div>
  <div class="card">
    <div id="route-list"><div class="empty"><div class="empty-icon">🧭</div>부동산탐색 탭에서 방문할 곳을 추가하세요</div></div>
  </div>
  <div id="route-actions" style="display:none">
    <div id="route-map" style="width:100%;height:220px;border-radius:10px;overflow:hidden;margin-bottom:10px"></div>
    <button class="btn btn-p" onclick="openKakaoNavi()" style="height:42px">🚗 카카오맵으로 길찾기</button>
  </div>
</div>

<!-- 탭3: 영업관리 -->
<div id="p3" class="panel">
  <!-- 오늘 요약 -->
  <div class="card" id="mgmt-summary">
    <div class="card-title">📊 영업 현황</div>
    <div id="mgmt-stats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"></div>
  </div>
  <!-- 재방문 예정 -->
  <div class="card">
    <div class="card-title">📅 재방문 예정</div>
    <div id="revisit-list"><div style="font-size:12px;color:var(--g4);text-align:center;padding:12px">재방문 예정 없음</div></div>
  </div>
  <!-- 즐겨찾기 -->
  <div class="card">
    <div class="card-title">⭐ 즐겨찾기 (단골 부동산)</div>
    <div id="fav-list"><div style="font-size:12px;color:var(--g4);text-align:center;padding:12px">즐겨찾기 없음<br><span style="font-size:10px">부동산탐색에서 ⭐ 버튼으로 추가</span></div></div>
  </div>
  <!-- 방문 이력 -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span class="card-title" style="margin:0">📋 방문 이력</span>
      <button class="btn-sm" style="color:var(--er)" onclick="if(confirm('이력 초기화?')){visitHistory=[];saveStorage();renderMgmt();}">초기화</button>
    </div>
    <div id="hist-list"><div style="font-size:12px;color:var(--g4);text-align:center;padding:12px">방문 이력 없음</div></div>
  </div>
</div>

<script>
window.onerror=function(m,s,l,c,e){console.error("JS오류:",m,l,c);return true;};
/* ═══ 설정 ═══ */
var API_KEY='309f2867723c36600c6c0b64a974752d51b0a08e629a82b2526d3b703742cfa7';
var SEOUL_GU=[
  {name:'강남구',code:'11680'},{name:'강동구',code:'11740'},{name:'강북구',code:'11305'},
  {name:'강서구',code:'11500'},{name:'관악구',code:'11620'},{name:'광진구',code:'11215'},
  {name:'구로구',code:'11530'},{name:'금천구',code:'11545'},{name:'노원구',code:'11350'},
  {name:'도봉구',code:'11320'},{name:'동대문구',code:'11230'},{name:'동작구',code:'11590'},
  {name:'마포구',code:'11440'},{name:'서대문구',code:'11410'},{name:'서초구',code:'11650'},
  {name:'성동구',code:'11200'},{name:'성북구',code:'11290'},{name:'송파구',code:'11710'},
  {name:'양천구',code:'11470'},{name:'영등포구',code:'11560'},{name:'용산구',code:'11170'},
  {name:'은평구',code:'11380'},{name:'종로구',code:'11110'},{name:'중구',code:'11140'},
  {name:'중랑구',code:'11260'}
];

/* ═══ 상태 ═══ */
var map,geocoder,ps,markers=[],myLoc=null,searchRadius=500;
/* localStorage 보안 오류 방지 */
function _ls(key,def){try{var v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}}
function _lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}
var routeList=_ls('rl',[]);
var memos=_ls('memos',{});
var revisitDates=_ls('revisitDates',{});
var favorites=_ls('favs',{});
var placeStatus=_ls('pstatus',{});
var visitHistory=_ls('vhist',[]);
var filterType='all',periodKey='m0',sortDesc=true,showCmp=false;
var guData=[],guDataPrev=[],_aptMap={},_curGuName='',curMemoId=null;

function saveStorage(){
  _lsSet('rl',routeList);
  _lsSet('memos',memos);
  _lsSet('revisitDates',revisitDates);
  _lsSet('favs',favorites);
  _lsSet('pstatus',placeStatus);

/* ═══ 날짜 유틸 ═══ */
function getYm(off){var d=new Date();d.setMonth(d.getMonth()-off);var m=d.getMonth()+1;return ''+d.getFullYear()+(m<10?'0':'')+m;}
function getYmLabel(off){var d=new Date();d.setMonth(d.getMonth()-off);return d.getFullYear()+'.'+(d.getMonth()+1);}
function getYmStr(d){var m=d.getMonth()+1;return ''+d.getFullYear()+(m<10?'0':'')+m;}
function fmtDt(d){return (d.getMonth()+1)+'/'+d.getDate();}
function dateInRange(y,m,day,from,to){var dt=new Date(y,m-1,day);return dt>=from&&dt<=to;}
function todayStr(){var d=new Date();var m=d.getMonth()+1,dd=d.getDate();return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(dd<10?'0':'')+dd;}
function dday(dateStr){
  var today=new Date(); today.setHours(0,0,0,0);
  var target=new Date(dateStr); target.setHours(0,0,0,0);
  return Math.round((target-today)/(1000*60*60*24));
}

/* ═══ 기간 ═══ */
function getPeriodRange(){
  if(periodKey==='m0') return {yms:[getYm(0)],prevYm:getYm(1),label:getYmLabel(0),weekly:false};
  if(periodKey==='m1') return {yms:[getYm(1)],prevYm:getYm(2),label:getYmLabel(1),weekly:false};
  if(periodKey==='m2') return {yms:[getYm(2)],prevYm:getYm(3),label:getYmLabel(2),weekly:false};
  var today=new Date();
  var d7=new Date(today); d7.setDate(today.getDate()-7);
  var d14=new Date(today); d14.setDate(today.getDate()-14);
  var d21=new Date(today); d21.setDate(today.getDate()-21);
  if(periodKey==='w0'){
    var yms=[],a=getYmStr(d7),b=getYmStr(today); yms.push(a); if(b!==a) yms.push(b);
    return {yms:yms,prevYms:[getYmStr(d14)],dateFrom:d7,dateTo:today,prevDateFrom:d14,prevDateTo:d7,label:'최근1주',weekly:true};
  }
  var yms=[],a=getYmStr(d14),b=getYmStr(d7); yms.push(a); if(b!==a) yms.push(b);
  var pyms=[],pa=getYmStr(d21),pb=getYmStr(d14); pyms.push(pa); if(pb!==pa) pyms.push(pb);
  return {yms:yms,prevYms:pyms,dateFrom:d14,dateTo:d7,prevDateFrom:d21,prevDateTo:d14,label:'2주전',weekly:true};
}

function setSort(d){sortDesc=d;document.getElementById('sort-desc').classList.toggle('on',d);document.getElementById('sort-asc').classList.toggle('on',!d);renderRank();}

/* ═══ API ═══ */
function buildUrl(ep,code,ym,rows){return 'https://apis.data.go.kr/1613000/'+ep+'/get'+ep+'?serviceKey='+encodeURIComponent(API_KEY)+'&pageNo=1&numOfRows='+(rows||1)+'&LAWD_CD='+code+'&DEAL_YMD='+ym+'&_type=json';}
function prx(url){
  var proxies=['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];
  return proxies[0]+encodeURIComponent(url);
}
function fetchWithFallback(url){
  var proxies=['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];
  function tryNext(i){
    if(i>=proxies.length) return Promise.resolve(null);
    return fetch(proxies[i]+encodeURIComponent(url),{
      signal:(function(){try{return AbortSignal.timeout(8000);}catch(e){return undefined;}})()
    }).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }).catch(function(){return tryNext(i+1);});
  }
  return tryNext(0);
}
function fetchCount(ep,code,ym){
  return fetchWithFallback(buildUrl(ep,code,ym,1))
    .then(function(d){return d&&d.response&&d.response.body?d.response.body.totalCount||0:0;})
    .catch(function(){return -1;});
}
function fetchItems(ep,code,ym,rows){
  return fetch(prx(buildUrl(ep,code,ym,rows||30)),{signal:AbortSignal.timeout(15000)})
    .then(function(r){return r.json();})
    .then(function(d){var it=d.response&&d.response.body&&d.response.body.items&&d.response.body.items.item;if(!it)return[];return Array.isArray(it)?it:[it];})
    .catch(function(){return[];});
}

function loadGuMonthly(pr){
  setLoadingUI(pr.label+' 조회 중...');
  var ym=pr.yms[0],done=0,total=SEOUL_GU.length*2;
  // 30초 전체 타임아웃 → 샘플 데이터
  var _timeout=setTimeout(function(){
    if(done<total){console.warn('타임아웃 → 샘플 데이터');loadSample();}
  },30000);
  function tick(){
    done++;
    if(done===total){clearTimeout(_timeout);finish();}
    else{document.getElementById('rank-list').innerHTML='<div style="text-align:center;padding:28px;color:var(--g4)"><div class="spin">⟳</div><div style="margin-top:7px;font-size:12px">조회 중 '+done+'/'+total+'</div></div>';}
  }
  function finish(){
    if(guData.every(function(d){return d.buy===-1&&d.rent===-1;})){loadSample();}
    else{var badge=document.getElementById('data-badge');badge.style.display='inline-block';badge.textContent='실데이터 · '+pr.label;badge.className='badge badge-g';renderRank();}
  }
  // 5개씩 배치 처리
  var batch=5,idx=0;
  function nextBatch(){
    if(idx>=SEOUL_GU.length)return;
    var end=Math.min(idx+batch,SEOUL_GU.length);
    for(var i=idx;i<end;i++){
      (function(i){
        fetchCount('RTMSDataSvcAptTradeDev',SEOUL_GU[i].code,ym).then(function(n){guData[i].buy=n;tick();});
        fetchCount('RTMSDataSvcAptRent',SEOUL_GU[i].code,ym).then(function(n){guData[i].rent=n;tick();});
      })(i);
    }
    idx=end;
    if(idx<SEOUL_GU.length)setTimeout(nextBatch,500);
  }
  nextBatch();
}

/* ═══ 랭킹 ═══ */
function cmpHtml(cur,prev){
  if(!showCmp||prev===0) return '';
  var pct=Math.round((cur-prev)/prev*100);
  if(pct>0) return ' <span class="up">▲'+pct+'%</span>';
  if(pct<0) return ' <span class="dn">▼'+Math.abs(pct)+'%</span>';
  return ' <span class="flat">-</span>';
}
function renderRank(){
  var list=guData.slice().map(function(d,i){
    var b=Math.max(d.buy,0),r=Math.max(d.rent,0);
    var pb=guDataPrev[i]?Math.max(guDataPrev[i].buy,0):0;
    var pr2=guDataPrev[i]?Math.max(guDataPrev[i].rent,0):0;
    var cnt=filterType==='buy'?b:filterType==='rent'?r:b+r;
    var pcnt=filterType==='buy'?pb:filterType==='rent'?pr2:pb+pr2;
    return{name:d.name,code:d.code,buy:b,rent:r,prevBuy:pb,prevRent:pr2,cnt:cnt,prevCnt:pcnt};
  }).filter(function(d){return d.cnt>0;}).sort(function(a,b){return sortDesc?b.cnt-a.cnt:a.cnt-b.cnt;});
  if(!list.length){document.getElementById('rank-list').innerHTML='<div style="padding:20px;text-align:center;color:var(--g4)">데이터 없음</div>';return;}
  var maxB=Math.max.apply(null,list.map(function(d){return d.buy;}))||1;
  var maxR=Math.max.apply(null,list.map(function(d){return d.rent;}))||1;
  document.getElementById('rank-list').innerHTML=list.map(function(d,i){
    var cls=sortDesc?(i===0?'t1':i===1?'t2':i===2?'t3':''):'';
    var pctB=Math.round(d.buy/maxB*100),pctR=Math.round(d.rent/maxR*100);
    var cntHtml=filterType==='all'?
      '<span class="badge badge-b">매 '+d.buy+'</span>&nbsp;<span class="badge badge-g">전 '+d.rent+'</span>'+
      (showCmp?'<div style="font-size:10px;margin-top:2px">'+cmpHtml(d.buy,d.prevBuy)+' '+cmpHtml(d.rent,d.prevRent)+'</div>':''):
      '<span style="font-size:13px;font-weight:800;color:var(--p)">'+d.cnt+'건</span>'+cmpHtml(d.cnt,d.prevCnt);
    return '<div class="rank-item" onclick="loadGuApt(\''+d.name+'\',\''+d.code+'\')">'+
      '<div class="rank-n '+cls+'">'+(i+1)+'</div>'+
      '<div class="rank-info"><div class="rank-name">'+d.name+'</div>'+
        (filterType!=='rent'?'<div class="bar-wrap"><div class="bar-buy" style="width:'+pctB+'%"></div></div>':'')+
        (filterType!=='buy'?'<div class="bar-wrap" style="margin-top:2px"><div class="bar-rent" style="width:'+pctR+'%"></div></div>':'')+
      '</div><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end;max-width:115px">'+cntHtml+'<span style="font-size:15px;color:var(--g3)">›</span></div></div>';
  }).join('');
}

function loadGuApt(guName,code){
  var pr=getPeriodRange();

  var frent=filterType!=='buy'?fetchItems('RTMSDataSvcAptRent',code,ym,100):Promise.resolve([]);
  Promise.all([fbuy,frent]).then(function(res){
    _aptMap={};_curGuName=guName;
    function add(items,type){
      items.forEach(function(it){
        var name=it['아파트']||it.aptNm||'미상',dong=it['법정동']||it.umdNm||'';
        if(pr.weekly){var y=parseInt(it['년']||it.dealYear||0),m=parseInt(it['월']||it.dealMonth||0),d=parseInt(it['일']||it.dealDay||0);if(!dateInRange(y,m,d,pr.dateFrom,pr.dateTo))return;}
        var k=name+'|'+dong;
        if(!_aptMap[k]) _aptMap[k]={name:name,dong:dong,buy:0,rent:0,buyItems:[],rentItems:[]};
        _aptMap[k][type]++; _aptMap[k][type+'Items'].push(it);
      });
    }
    add(res[0],'buy'); add(res[1],'rent');
    var apts=Object.values(_aptMap).sort(function(a,b){return(b.buy+b.rent)-(a.buy+a.rent);});
    if(!apts.length){document.getElementById('apt-list').innerHTML='<div style="padding:14px;text-align:center;color:var(--g4)">데이터 없음</div>';return;}
    document.getElementById('apt-badge').textContent=apts.length+'개';
    document.getElementById('apt-list').innerHTML=apts.map(function(a,i){
      var key=escQ(a.name+'|'+a.dong);
      var avgB=calcAvg(a.buyItems,'buy'),avgR=calcAvg(a.rentItems,'rent');
      var priceHint=avgB?'매 평균 '+fmtPrice(avgB):avgR?'전 평균 '+fmtPrice(avgR):'';
      return '<div class="rank-item" onclick="showAptDetail(\''+key+'\')">'+
        '<div class="rank-n">'+(i+1)+'</div>'+
        '<div class="rank-info"><div class="rank-name">'+a.name+'</div>'+
          '<div class="rank-sub">'+a.dong+(priceHint?' · '+priceHint:'')+'</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:3px">'+
          (a.buy?'<span class="badge badge-b">매 '+a.buy+'</span>':'')+
          (a.rent?'<span class="badge badge-g">전 '+a.rent+'</span>':'')+
          '<span style="font-size:15px;color:var(--g3)">›</span>'+
        '</div></div>';
    }).join('');
  });
}

function calcAvg(items,type){var vals=getPrices(items,type);return vals.length?Math.round(vals.reduce(function(s,v){return s+v;},0)/vals.length):0;}
function calcMin(items,type){var vals=getPrices(items,type);return vals.length?Math.min.apply(null,vals):0;}
function calcMax(items,type){var vals=getPrices(items,type);return vals.length?Math.max.apply(null,vals):0;}
function getPrices(items,type){
  var f=type==='buy'?'거래금액':'보증금액',af=type==='buy'?'dealAmount':'deposit';
  return items.map(function(it){return parseInt(((it[f]||it[af]||'0')+'').replace(/,/g,''))||0;}).filter(function(v){return v>0;});
}
function makeTxTable(items,type){

    var priceRaw=parseInt(((it[pf]||it[apf]||'0')+'').replace(/,/g,''))||0;
    var area=parseFloat(it['전용면적']||it.excluUseAr||0);
    var pyeong=area?(area/3.305).toFixed(0)+'평':'';
    var unitPrice=area&&priceRaw?Math.round(priceRaw/area)+'만/㎡':'';
    return '<tr style="border-bottom:1px solid var(--g2)">'+
      '<td style="padding:6px 3px;font-size:12px;font-weight:700;color:'+(type==='buy'?'var(--p)':'var(--ok)')+'">'+fmtPrice(priceRaw)+'</td>'+
      '<td style="padding:6px 3px;font-size:10px;color:var(--g5);text-align:center">'+(area?area.toFixed(0)+'㎡':'–')+'<br><span style="color:var(--g4)">'+pyeong+'</span></td>'+
      '<td style="padding:6px 3px;font-size:10px;color:var(--g5);text-align:center">'+(it['층']||it.floor||'–')+'층</td>'+
      '<td style="padding:6px 3px;font-size:10px;color:var(--g5);text-align:center">'+unitPrice+'</td>'+
      '<td style="padding:6px 3px;font-size:10px;color:var(--g4);text-align:right">'+(it['일']||it.dealDay||'–')+'일</td>'+
    '</tr>';
  }).join('');
  return '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'+
    '<thead><tr style="background:var(--g1)">'+
      '<th style="padding:5px 3px;font-size:10px;color:var(--g5);text-align:left;font-weight:600">'+(type==='buy'?'매매가':'보증금')+'</th>'+
      '<th style="padding:5px 3px;font-size:10px;color:var(--g5);text-align:center;font-weight:600">면적</th>'+
      '<th style="padding:5px 3px;font-size:10px;color:var(--g5);text-align:center;font-weight:600">층</th>'+
      '<th style="padding:5px 3px;font-size:10px;color:var(--g5);text-align:center;font-weight:600">단가</th>'+

/* ═══ 지도 ═══ */
var _kakaoLoaded=false,_kakaoLoading=false,_kakaoQ=[];
function loadKakaoSDK(cb){
  if(_kakaoLoaded){if(cb)cb();return;}
  if(cb)_kakaoQ.push(cb);
  if(_kakaoLoading)return;
  _kakaoLoading=true;
  var s=document.createElement('script');
  s.src='//dapi.kakao.com/v2/maps/sdk.js?appkey=cfe76927c996dc6216ee17726d947313&libraries=services,clusterer&autoload=false';
  s.onload=function(){
    kakao.maps.load(function(){
      _kakaoLoaded=true;_kakaoLoading=false;
      _kakaoQ.forEach(function(f){try{f();}catch(e){}});
      _kakaoQ=[];
    });
  };
  s.onerror=function(){
    _kakaoLoading=false;
    toast('지도 SDK 로드 실패 - 카카오 콘솔 확인 필요');
  };
  document.head.appendChild(s);
}
function initMap(){
  loadKakaoSDK(function(){
    if(map)return;
    var mapDiv=document.getElementById('map');
    if(!mapDiv){toast('지도 영역 없음');return;}
    try{
      map=new kakao.maps.Map(mapDiv,{center:new kakao.maps.LatLng(37.5665,126.9780),level:5});
      ps=new kakao.maps.services.Places();
      geocoder=new kakao.maps.services.Geocoder();
    }catch(e){
      toast('지도 오류: '+(e&&e.message?e.message.substring(0,30):String(e).substring(0,30)));
      console.error('Kakao Map init error:',e);
    }
  });
}
function useMyLoc(){
  if(!_kakaoLoaded){loadKakaoSDK(function(){setTimeout(useMyLoc,200);});return;}
  if(!map){initMap();setTimeout(useMyLoc,300);return;}
  if(!navigator.geolocation){alert('위치 서비스 미지원');return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    myLoc=new kakao.maps.LatLng(pos.coords.latitude,pos.coords.longitude);
    map.setCenter(myLoc); map.setLevel(4);
    new kakao.maps.Marker({map:map,position:myLoc,image:new kakao.maps.MarkerImage('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',new kakao.maps.Size(24,35))});
    searchNearby(myLoc);
  },function(){alert('위치 정보를 가져올 수 없습니다.');});
}
function searchAddr(){
  if(!_kakaoLoaded){loadKakaoSDK(function(){setTimeout(searchAddr,200);});return;}
  if(!map){initMap();setTimeout(searchAddr,300);return;}
  var kw=document.getElementById('search-kw').value.trim(); if(!kw){alert('검색어를 입력하세요');return;}
  geocoder.addressSearch(kw,function(result,status){
    if(status===kakao.maps.services.Status.OK){var loc=new kakao.maps.LatLng(result[0].y,result[0].x);myLoc=loc;map.setCenter(loc);map.setLevel(4);searchNearby(loc);}
    else{ps.keywordSearch(kw,function(data,status){if(status===kakao.maps.services.Status.OK&&data.length){var loc=new kakao.maps.LatLng(data[0].y,data[0].x);myLoc=loc;map.setCenter(loc);map.setLevel(4);searchNearby(loc);}else alert('검색 결과 없음.');});}
  });
}
function setRadius(r){searchRadius=r;['r300','r500','r1000','r2000'].forEach(function(k){document.getElementById(k).classList.remove('on');});document.getElementById('r'+r).classList.add('on');if(myLoc)searchNearby(myLoc);}

function statusLabel(id){var s=placeStatus[id];return s==='reg'?'<span class="tag tag-reg">단골</span>':s==='hold'?'<span class="tag tag-hold">보류</span>':'<span class="tag tag-new">신규</span>';}
function cycleStatus(id){var s=placeStatus[id];placeStatus[id]=s==='new'||!s?'reg':s==='reg'?'hold':'new';saveStorage();searchNearby(myLoc);}

function searchNearby(loc){
  markers.forEach(function(m){m.setMap(null);}); markers=[];
  var allData=[];
  function fetchPage(page){
    ps.keywordSearch('공인중개사',function(data,status,pagination){
      if(status===kakao.maps.services.Status.OK){
        allData=allData.concat(data);
        if(pagination.hasNextPage&&page<3){fetchPage(page+1);}
        else{renderEstList(allData,loc);}
      } else if(page===1){
        document.getElementById('est-list').innerHTML='<div class="empty"><div class="empty-icon">😢</div>검색 결과 없음</div>';
      } else {
        renderEstList(allData,loc);
      }
    },{location:loc,radius:searchRadius,sort:kakao.maps.services.SortBy.DISTANCE,page:page,size:15});
  }
  fetchPage(1);
}
function renderEstList(data,loc){
    if(!data||!data.length){document.getElementById('est-list').innerHTML='<div class="empty"><div class="empty-icon">😢</div>검색 결과 없음</div>';return;}
    document.getElementById('est-count').textContent='주변 공인중개사 '+data.length+'곳';
    // 마커 초기화
    markers.forEach(function(m){m.setMap(null);}); markers=[];
    var html='';
    data.forEach(function(d,i){
      var pos=new kakao.maps.LatLng(d.y,d.x);
      var dist=distM(loc.getLat(),loc.getLng(),parseFloat(d.y),parseFloat(d.x));
      var isFav=!!favorites[d.id];
      var isDone=routeList.some(function(r){return r.id===d.id&&r.done;});
      var isAdded=routeList.some(function(r){return r.id===d.id;});
      var memo=memos[d.id]||'';
      var rv=revisitDates[d.id]||'';
      var numCls=isFav?'fav':isDone?'visited':'';
      var numTxt=isFav?'⭐':isDone?'✓':(i+1);
      // 마커 색
      var marker=new kakao.maps.Marker({map:map,position:pos});
      var iw=new kakao.maps.InfoWindow({content:'<div style="padding:3px 7px;font-size:11px;white-space:nowrap">'+(isFav?'⭐ ':'')+d.place_name+'</div>'});
      kakao.maps.event.addListener(marker,'click',function(){iw.open(map,marker);});
      markers.push(marker);
      // 마지막 방문일
      var lastVisit=visitHistory.filter(function(h){return h.id===d.id;}).slice(-1)[0];
      var lastVisitHtml=lastVisit?'<span style="font-size:9px;color:var(--g4)">최근방문: '+lastVisit.date+'</span> ':'';
      var rvHtml='';
      if(rv){var dd2=dday(rv);rvHtml='<span class="'+(dd2<=3?'dday-soon':'dday-ok')+'" style="font-size:9px">재방문 D-'+dd2+'</span> ';}
      html+='<div class="est-item">'+
        '<div class="est-num '+numCls+'">'+numTxt+'</div>'+
        '<div class="est-info">'+
          '<div class="est-name">'+d.place_name+'</div>'+
          '<div class="est-addr">'+(d.road_address_name||d.address_name)+'</div>'+
          '<div class="est-dist">📍 '+dist+'m &nbsp;'+lastVisitHtml+rvHtml+'</div>'+
          '<div class="est-tags">'+statusLabel(d.id)+(memo?'<span style="font-size:9px;color:var(--warn)">📝'+memo.substring(0,12)+(memo.length>12?'…':'')+'</span>':'')+'</div>'+
        '</div>'+
        '<div class="est-actions">'+
          '<div style="display:flex;gap:3px">'+
            (d.phone?'<button class="btn-sm" onclick="window.open(\'tel:'+d.phone+'\')" style="color:var(--ok)">📞</button>':'')+
            '<button class="btn-sm '+(isFav?'':'')+'" onclick="toggleFav(\''+d.id+'\',\''+escQ(d.place_name)+'\',\''+escQ(d.road_address_name||d.address_name)+'\','+d.y+','+d.x+',\''+escQ(d.phone||'')+'\')">'+
              (isFav?'⭐':'☆')+'</button>'+
          '</div>'+
          '<button class="btn-sm" onclick="cycleStatus(\''+d.id+'\')" style="font-size:9px">상태변경</button>'+
          '<button class="btn-sm '+(isAdded?'':'')+'" onclick="addRoute(\''+d.id+'\',\''+escQ(d.place_name)+'\',\''+escQ(d.road_address_name||d.address_name)+'\','+d.y+','+d.x+',\''+escQ(d.phone||'')+'\',this)" style="'+(isAdded?'color:var(--ok)':'')+'">'+
            (isAdded?'✅동선':'＋동선')+'</button>'+
          '<button class="btn-sm" onclick="openMemo(\''+d.id+'\',\''+escQ(d.place_name)+'\')">📝메모</button>'+
        '</div>'+
      '</div>';
    });
    document.getElementById('est-list').innerHTML=html;
}
function distM(lat1,lng1,lat2,lng2){var R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;var a=Math.pow(Math.sin(dLat/2),2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.pow(Math.sin(dLng/2),2);return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));}

function toggleFav(id,name,addr,lat,lng,phone){

function openMemo(id,name){
  curMemoId=id;

function closeMemo(){document.getElementById('memo-modal').style.display='none';curMemoId=null;}
function saveMemo(){
  var txt=document.getElementById('memo-text').value.trim();
  var dt=document.getElementById('memo-date').value;
  if(txt) memos[curMemoId]=txt; else delete memos[curMemoId];
  if(dt) revisitDates[curMemoId]=dt; else delete revisitDates[curMemoId];
  var ri=routeList.find(function(r){return r.id===curMemoId;});

  saveStorage(); closeMemo(); toast('저장됨');

/* ═══ 동선 ═══ */
function addRoute(id,name,addr,lat,lng,phone,btn){
  var idx=routeList.findIndex(function(r){return r.id===id;});
  if(idx>=0){routeList.splice(idx,1);if(btn){btn.textContent='＋동선';btn.style.color='';}toast('제거됐습니다');}
  else{routeList.push({id:id,name:name,addr:addr,lat:parseFloat(lat),lng:parseFloat(lng),phone:phone,done:false,memo:memos[id]||'',revisit:revisitDates[id]||''});if(btn){btn.textContent='✅동선';btn.style.color='var(--ok)';}toast(name+' 추가!');}
  saveStorage(); updateBadges();
}
function toggleDone(id){
  var r=routeList.find(function(r){return r.id===id;});
  if(r){
    r.done=!r.done;
    if(r.done){
      // 방문 이력 저장
      visitHistory.unshift({id:id,name:r.name,addr:r.addr,date:todayStr(),memo:r.memo||''});
      if(visitHistory.length>200) visitHistory.pop();
    }
    saveStorage(); renderRoute();
  }
}
function removeRoute(id){routeList=routeList.filter(function(r){return r.id!==id;});saveStorage();renderRoute();updateBadges();}
function clearRoute(){if(!confirm('초기화할까요?'))return;routeList=[];saveStorage();renderRoute();updateBadges();}
function updateBadges(){
  var rb=document.getElementById('route-badge');
  if(routeList.length){rb.textContent='동선 '+routeList.length;rb.style.display='inline-block';}else rb.style.display='none';
  var fb=document.getElementById('fav-badge');

}

var routeMap=null,routeMarkers=[];
function renderRoute(){
  var done=routeList.filter(function(r){return r.done;}).length,total=routeList.length;
  document.getElementById('done-cnt').textContent=done;
  document.getElementById('total-cnt').textContent=total;
  document.getElementById('progress-bar').style.width=(total?Math.round(done/total*100):0)+'%';
  // 오늘 재방문 예정 알림
  var today=todayStr();
  var alerts=routeList.filter(function(r){return r.revisit&&r.revisit<=today&&!r.done;});
  var alertEl=document.getElementById('revisit-alert');
  if(alerts.length){alertEl.style.display='block';alertEl.innerHTML='<div style="background:#fee2e2;border-radius:10px;padding:10px;margin-bottom:10px;font-size:12px;color:var(--er)">⚠️ 오늘 재방문 예정: '+alerts.map(function(r){return r.name;}).join(', ')+'</div>';}
  else alertEl.style.display='none';
  var el=document.getElementById('route-list'),act=document.getElementById('route-actions');
  if(!total){el.innerHTML='<div class="empty"><div class="empty-icon">🧭</div>부동산탐색 탭에서 방문할 곳을 추가하세요</div>';act.style.display='none';return;}
  el.innerHTML=routeList.map(function(r,i){
    var dd2=r.revisit?dday(r.revisit):null;
    var rvHtml=dd2!==null?'<span class="'+(dd2<=0?'dday-soon':'dday-ok')+'"> · 재방문 '+(dd2===0?'오늘':dd2>0?'D-'+dd2:'D+'+Math.abs(dd2))+'</span>':'';
    return '<div class="route-item'+(r.done?' done':'')+'">'+
      '<div class="route-num'+(r.done?' done':'')+'" onclick="toggleDone(\''+r.id+'\')" title="클릭: 완료처리">'+(r.done?'✓':(i+1))+'</div>'+
      '<div class="route-info"><div class="route-name">'+r.name+'</div><div class="route-addr">'+r.addr+'</div>'+
        (r.memo||rvHtml?'<div class="route-meta">'+(r.memo?'📝 '+r.memo:'')+(rvHtml)+'</div>':'')+
      '</div>'+
      '<div class="route-actions">'+
        (r.phone?'<button class="btn-sm" onclick="window.open(\'tel:'+r.phone+'\')" style="color:var(--ok)">📞</button>':'')+
        '<button class="btn-sm" onclick="openMemo(\''+r.id+'\',\''+escQ(r.name)+'\')">📝</button>'+
        '<button class="btn-sm" style="color:var(--er)" onclick="removeRoute(\''+r.id+'\')">삭제</button>'+
      '</div></div>';
  }).join('');
  act.style.display='block'; setTimeout(renderRouteMap,100);
}
function renderRouteMap(){
  var c=document.getElementById('route-map');
  if(!routeMap) routeMap=new kakao.maps.Map(c,{center:new kakao.maps.LatLng(routeList[0].lat,routeList[0].lng),level:5});
  routeMarkers.forEach(function(m){m.setMap(null);}); routeMarkers=[];
  var bounds=new kakao.maps.LatLngBounds();
  routeList.forEach(function(r,i){
    var pos=new kakao.maps.LatLng(r.lat,r.lng); bounds.extend(pos);
    var marker=new kakao.maps.Marker({map:routeMap,position:pos});
    new kakao.maps.InfoWindow({content:'<div style="padding:3px 7px;font-size:11px;white-space:nowrap">'+(r.done?'✅ ':'')+'<b>'+(i+1)+'.</b> '+r.name+'</div>'}).open(routeMap,marker);
    routeMarkers.push(marker);
  });
  routeMap.setBounds(bounds);
}
function openKakaoNavi(){
  if(!routeList.length){alert('방문 목록이 없습니다');return;}
  var remain=routeList.filter(function(r){return !r.done;});
  if(!remain.length){alert('모두 방문 완료!');return;}
  // 카카오맵 경유지 URL (최대 5개)
  var stops=remain.slice(0,5);
  var base='https://map.kakao.com/link/';
  if(stops.length===1){
    window.open(base+'to/'+encodeURIComponent(stops[0].name)+','+stops[0].lat+','+stops[0].lng);
  } else {
    // 출발→경유→도착 형식
    var dest=stops[stops.length-1];
    var url=base+'to/'+encodeURIComponent(dest.name)+','+dest.lat+','+dest.lng;
    toast('카카오맵으로 이동 (최대 5곳)');
    window.open(url);
  }
}

function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(function(){el.style.display='none';},2000);}


/* ═══ 최적 동선 ═══ */
function optimizeRoute(){
  if(routeList.length<2){toast('2곳 이상 추가해야 최적화 가능');return;}
  var unvisited=routeList.filter(function(r){return !r.done;});
  if(unvisited.length<2){toast('미방문 장소가 2곳 이상 필요');return;}
  // Nearest Neighbor 알고리즘
  var start=unvisited[0];
  var remaining=unvisited.slice(1);
  var ordered=[start];
  while(remaining.length>0){
    var last=ordered[ordered.length-1];
    var minDist=Infinity,minIdx=0;
    remaining.forEach(function(r,i){
      var d=Math.pow(r.lat-last.lat,2)+Math.pow(r.lng-last.lng,2);
      if(d<minDist){minDist=d;minIdx=i;}
    });
    ordered.push(remaining[minIdx]);
    remaining.splice(minIdx,1);
  }
  // 방문완료 항목은 끝에 유지
  var done=routeList.filter(function(r){return r.done;});
  routeList=ordered.concat(done);
  saveStorage(); renderRoute();
  toast('✅ 최적 동선으로 순서 변경됨');
}

// 터치 이벤트 강화: onclick 외에 touchend도 처리
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('button').forEach(function(btn){
    btn.addEventListener('touchend',function(e){
      e.preventDefault();
      var fn=btn.getAttribute('onclick');
      if(fn){try{eval(fn);}catch(ex){}}
    },{passive:false});
  });
});
